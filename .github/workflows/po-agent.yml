name: PO Agent — Issue Review

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'po-agent') ||
      (github.event_name == 'issue_comment' &&
       github.event.sender.type != 'Bot' &&
       contains(github.event.issue.labels.*.name, 'po-agent'))
    permissions:
      contents: read
      issues: write
    uses: YOUR_ORG/YOUR_PIPELINE_REPO/.github/workflows/po-agent.yml@v1
    with:
      issue_number: ${{ github.event.issue.number }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLAUDE_PIPELINE_TOKEN: ${{ secrets.CLAUDE_PIPELINE_TOKEN }}
