name: Claude — Fix Review Feedback

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: 'PR number to fix'
        required: true
        type: string

jobs:
  fix:
    permissions:
      contents: write
      pull-requests: write
      issues: read
      actions: read
    uses: Ashtakala/claude-pipeline/.github/workflows/claude-fix-review.yml@v1
    with:
      pr_number: ${{ inputs.pr_number }}
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLAUDE_PIPELINE_TOKEN: ${{ secrets.CLAUDE_PIPELINE_TOKEN }}
