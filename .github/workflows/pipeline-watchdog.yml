name: Pipeline Watchdog — Auto-breakdown stalled issues

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  watchdog:
    permissions:
      contents: read
      issues: write
      pull-requests: read
      actions: read
    uses: Ashtakala/claude-pipeline/.github/workflows/pipeline-watchdog.yml@v1
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLAUDE_PIPELINE_TOKEN: ${{ secrets.CLAUDE_PIPELINE_TOKEN }}
