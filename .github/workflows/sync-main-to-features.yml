name: Sync Main Into Open Feature Branches

on:
  push:
    branches: [main]

jobs:
  sync:
    permissions:
      contents: write
      pull-requests: write
    uses: Ashtakala/claude-pipeline/.github/workflows/sync-main-to-features.yml@v1
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      CLAUDE_PIPELINE_TOKEN: ${{ secrets.CLAUDE_PIPELINE_TOKEN }}
